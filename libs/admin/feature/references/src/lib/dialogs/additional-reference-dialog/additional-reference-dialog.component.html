<div class="flex flex-col gap-4">
  <label class="flex flex-col gap-2">
    <span class="text-sm font-medium text-surface-600 dark:text-surface-300">ID</span>
    <input
      pInputText
      type="number"
      min="1"
      step="1"
      [(ngModel)]="draft.id"
      [disabled]="isEditMode"
      class="h-10 w-full text-sm"
    />
  </label>

  <label class="flex flex-col gap-2">
    <span class="text-sm font-medium text-surface-600 dark:text-surface-300">Назва</span>
    <input pInputText type="text" [(ngModel)]="draft.name" class="h-10 w-full text-sm" />
  </label>

  <label class="flex flex-col gap-2">
    <span class="text-sm font-medium text-surface-600 dark:text-surface-300">Ключ</span>
    <input pInputText type="text" [(ngModel)]="draft.key" class="h-10 w-full text-sm" />
  </label>

  <label class="flex flex-col gap-2">
    <span class="text-sm font-medium text-surface-600 dark:text-surface-300">Значення</span>
    <input
      pInputText
      type="number"
      min="0"
      step="0.01"
      [(ngModel)]="draft.value"
      class="h-10 w-full text-sm"
    />
  </label>

  <label class="flex flex-col gap-2">
    <span class="text-sm font-medium text-surface-600 dark:text-surface-300">Одиниця</span>
    <input pInputText type="text" [(ngModel)]="draft.unit" class="h-10 w-full text-sm" />
  </label>

  <label class="flex flex-col gap-2">
    <span class="text-sm font-medium text-surface-600 dark:text-surface-300">Опис</span>
    <input pInputText type="text" [(ngModel)]="draft.description" class="h-10 w-full text-sm" />
  </label>

  <div class="flex items-center justify-end gap-2 pt-2">
    <button pButton type="button" text severity="secondary" size="small" (click)="cancel()">
      <i pButtonIcon class="pi pi-times"></i>
      <span pButtonLabel>Скасувати</span>
    </button>
    <button pButton type="button" size="small" [disabled]="!canSave" (click)="save()">
      <i pButtonIcon class="pi pi-check"></i>
      <span pButtonLabel>Зберегти</span>
    </button>
  </div>
</div>
