<div
  class="resize-container-6 min-h-screen flex relative bg-surface-0 lg:static dark:bg-surface-950"
>
  <div
    id="app-sidebar-10"
    class="absolute left-0 top-0 z-10 h-screen w-[280px] shrink-0 select-none bg-surface-0 lg:static lg:block dark:bg-surface-950 hidden"
  >
    <div class="flex h-full flex-col">
      <div class="flex shrink-0 items-center gap-4 p-4">
        <a routerLink="/" class="flex items-center gap-2">
          <img
            ngSrc="/assets/logo/brevi-logo-dark.png"
            width="131"
            height="63"
            alt="Brevi"
            class="h-14 w-auto"
          />
        </a>
      </div>

      <div class="flex flex-1 flex-col gap-4 overflow-y-auto p-2">
        <div class="flex flex-col gap-1">
          <p-iconfield iconPosition="left">
            <p-inputicon
              class="pi pi-search text-base! leading-none! text-surface-500 dark:text-surface-400"
            ></p-inputicon>
            <input
              pInputText
              type="text"
              placeholder="Search"
              class="w-full rounded-[18px]! border! border-surface-200! py-2! pl-8! dark:border-surface-700!"
            />
          </p-iconfield>
        </div>

        <p-panelMenu
          [model]="menuItems"
          [multiple]="true"
          [pt]="panelMenuPt"
          styleClass="w-full border-0 bg-transparent shadow-none"
        >
          <ng-template pTemplate="item" let-item>
            @if (item.items?.length || item.label === 'Загальні звіти') {
              <div class="flex items-center gap-4 text-surface-900 dark:text-surface-0">
                <span class="font-semibold text-base leading-tight">{{ item.label }}</span>
                @if (item.items?.length) {
                  <i
                    class="pi pi-angle-down ml-auto text-base! leading-none! text-surface-500 dark:text-surface-400"
                  ></i>
                }
              </div>
            } @else {
              <div class="flex items-center gap-2 text-surface-700 dark:text-surface-200">
                <span
                  class="inline-flex items-center justify-center rounded-md border border-surface-200 bg-surface-100 p-1 dark:border-surface-700 dark:bg-surface-800"
                >
                  <i
                    class="pi pi-circle text-xs! leading-none! text-surface-500 dark:text-surface-400"
                  ></i>
                </span>
                <span class="font-medium text-base leading-tight">{{ item.label }}</span>
              </div>
            }
          </ng-template>
        </p-panelMenu>
      </div>

      <div class="mt-auto p-4">
        <a class="flex cursor-pointer items-center gap-2 text-surface-900 dark:text-surface-0">
          <img
            src="https://fqjltiegiezfetthbags.supabase.co/storage/v1/render/image/public/block.images/blocks/avatars/avatar-amyels.png"
            alt="Amy Elsner"
            class="h-8 w-8 rounded-full"
          />
          <span class="font-medium text-base leading-tight">Amy Elsner</span>
        </a>
      </div>
    </div>
  </div>

  <div class="relative flex min-h-screen flex-auto flex-col">
    <div
      class="relative flex items-center justify-between bg-surface-0 px-8 py-4 lg:static dark:bg-surface-950"
    >
      <div class="flex items-center gap-8">
        <a
          pStyleClass="#app-sidebar-10"
          enterFromClass="hidden"
          enterActiveClass="animate-fadeinleft"
          leaveToClass="hidden"
          leaveActiveClass="animate-fadeoutleft"
          [hideOnOutsideClick]="true"
          [hideOnResize]="true"
          resizeSelector=".resize-container-6"
          class="flex cursor-pointer items-center justify-center text-surface-700 lg:hidden dark:text-surface-100"
        >
          <i class="pi pi-bars text-xl! leading-none!"></i>
        </a>
        <i
          class="pi pi-sparkles text-xl! leading-none! text-surface-700 cursor-pointer hover:text-primary-emphasis dark:text-surface-400 dark:hover:text-primary-emphasis"
        ></i>
        <i
          class="pi pi-inbox text-xl! leading-none! text-surface-700 cursor-pointer hover:text-primary-emphasis dark:text-surface-400 dark:hover:text-primary-emphasis"
        ></i>
        <i
          class="pi pi-bell text-xl! leading-none! text-surface-700 cursor-pointer hover:text-primary-emphasis dark:text-surface-400 dark:hover:text-primary-emphasis"
        ></i>
      </div>
      <div class="flex items-center">
        <img
          src="https://fqjltiegiezfetthbags.supabase.co/storage/v1/render/image/public/block.images/blocks/avatars/avatar-amyels.png"
          alt="Amy Elsner"
          class="h-8 w-8 cursor-pointer rounded-full"
        />
      </div>
    </div>

    <div class="flex flex-auto flex-col p-8">
      <div
        class="flex-auto rounded-2xl border-2 border-dashed border-surface-200 bg-surface-50 dark:border-surface-700 dark:bg-surface-900"
      ></div>
    </div>
  </div>
</div>
