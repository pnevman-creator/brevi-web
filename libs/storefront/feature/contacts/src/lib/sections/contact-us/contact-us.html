<div class="bg-brand-bg dark:bg-surface-950 px-6 py-20 md:px-12 lg:px-20">
  <div class="flex lg:flex-row flex-col-reverse gap-12">
    <div class="w-full flex-1 flex flex-col gap-4">
      <div class="flex flex-col gap-2">
        <label for="name" class="text-surface-800 dark:text-surface-100 font-medium">
          {{ 'contacts.form.name' | transloco }}
        </label>
        <input pInputText id="name" [(ngModel)]="contact.name" name="name" />
      </div>
      <div class="flex flex-col gap-2">
        <label for="email1" class="text-surface-800 dark:text-surface-100 font-medium">
          {{ 'contacts.form.email' | transloco }}
        </label>
        <input pInputText id="email1" [(ngModel)]="contact.email" name="email" />
      </div>
      <div class="flex flex-col gap-2">
        <label for="company" class="text-surface-800 dark:text-surface-100 font-medium">
          {{ 'contacts.form.company' | transloco }}
        </label>
        <input pInputText id="company" [(ngModel)]="contact.company" name="company" />
      </div>
      <div class="flex flex-col gap-2">
        <label for="message" class="text-surface-800 dark:text-surface-100 font-medium">
          {{ 'contacts.form.message' | transloco }}
        </label>
        <textarea
          pInputTextarea
          rows="5"
          cols="30"
          [(ngModel)]="contact.message"
          name="message"
        ></textarea>
      </div>
      <button pButton type="button" class="w-fit">
        <i pButtonIcon class="pi pi-send"></i>
        <span pButtonLabel>{{ 'contacts.form.send' | transloco }}</span>
      </button>
    </div>
    <div class="overflow-hidden relative w-full flex-1 flex flex-col gap-12">
      <div class="flex flex-col gap-4">
        <div class="text-surface-900 dark:text-surface-0 text-4xl font-medium">
          {{ 'contacts.info.title' | transloco }}
        </div>
        <div class="text-surface-700 dark:text-surface-0/70 leading-normal">
          {{ 'contacts.info.description' | transloco }}
        </div>
      </div>

      <a
        href="https://maps.app.goo.gl/soo9eZ9rQQC3MawD9"
        target="_blank"
        rel="noopener noreferrer"
        class="inline-flex items-center text-primary font-bold no-underline cursor-pointer gap-2"
      >
        <span>{{ 'contacts.info.viewOnMap' | transloco }}</span>
        <i class="pi pi-arrow-right"></i>
      </a>
      <ul class="list-none p-0 m-0 text-surface-700 dark:text-surface-0/70">
        <li class="flex items-center mb-4">
          <i class="pi pi-phone text-lg! leading-none! mr-4"></i>
          <span>050 307 55 54</span>
        </li>
        <li class="flex items-center mb-4">
          <i class="pi pi-phone text-lg! leading-none! mr-4"></i>
          <span>0532 67 11 09</span>
        </li>
        <li class="flex items-center">
          <i class="pi pi-map-marker text-lg! leading-none! mr-4"></i>
          <span>{{ 'contacts.info.address' | transloco }}</span>
        </li>
      </ul>
    </div>
  </div>
</div>
