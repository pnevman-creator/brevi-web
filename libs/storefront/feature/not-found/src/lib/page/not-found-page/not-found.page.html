<section class="bg-neutral-50 dark:bg-surface-900 p-20">
  <div class="flex flex-col gap-10 items-center justify-center min-h-140">
    <div
      class="w-full flex justify-center items-center bg-[radial-gradient(50%_109137.91%_at_50%_50%,color-mix(in_srgb,var(--p-primary-500)_10%,transparent)_0%,rgba(254,244,247,0)_100%)] rounded-lg"
    >
      <div class="bg-neutral-50 dark:bg-surface-900 px-8">
        <div
          class="bg-primary-50 dark:bg-primary-900 text-primary dark:text-primary-100 rounded-xl px-2 py-1 font-medium"
        >
          404
        </div>
      </div>
    </div>
    <div class="flex flex-col items-center gap-4">
      <h1 class="text-5xl font-bold text-surface-900 dark:text-surface-0 text-center leading-tight">
        {{ 'notFound.title' | transloco }}
      </h1>
      <p class="text-lg text-surface-500 dark:text-surface-400 text-center mt-0 leading-normal">
        {{ 'notFound.description' | transloco }}
      </p>
    </div>
    <div class="flex justify-center items-center gap-6 flex-wrap">
      <button pButton [text]="true" class="text-base! leading-normal!" (click)="goBack()">
        <i pButtonIcon class="pi pi-arrow-left"></i>
        <span pButtonLabel>{{ 'notFound.actions.back' | transloco }}</span>
      </button>
      <button pButton class="text-base! leading-normal!" [routerLink]="catalogLink()">
        <i pButtonIcon class="pi pi-home"></i>
        <span pButtonLabel>{{ 'notFound.actions.catalog' | transloco }}</span>
      </button>
    </div>
  </div>
</section>
